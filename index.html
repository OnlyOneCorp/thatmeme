<style>
  :root{
    --bg:#f5f5f7;--surface:#ffffff;--ink:#1d1d1f;--ink-2:#6e6e73;--ink-3:#86868b;
    --accent:#0071e3;--accent-press:#0077ed;--hairline:#d2d2d7;--pill:#f5f5f7;
    --radius:18px;--shadow:0 4px 30px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","SF Pro Display",system-ui,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;}
  .wrap{max-width:820px;margin:0 auto;padding:0 22px;}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 0 0;}
  .lang{border:1px solid var(--hairline);background:var(--surface);color:var(--ink-2);font:inherit;font-size:14px;font-weight:600;padding:7px 14px;border-radius:980px;cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
  .lang:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
  .onlyone{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink-2);font-size:14px;font-weight:600;border:1px solid var(--hairline);background:var(--surface);padding:6px 13px 6px 10px;border-radius:980px;transition:background .15s,color .15s,border-color .15s;}
  .onlyone:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
  .onlyone svg{width:18px;height:18px;display:block;}
  .ad-slot{margin:34px 0 0;min-height:90px;border:1px dashed var(--hairline);border-radius:12px;}

  header{padding:34px 0 22px;text-align:center;}
  .eyebrow{font-size:15px;font-weight:600;color:var(--accent);margin:0 0 14px;letter-spacing:-.01em;}
  .brand{font-size:clamp(44px,9vw,74px);font-weight:800;letter-spacing:-.035em;line-height:1;margin:0 0 16px;}
  .brand .that{color:var(--accent);}
  .sub{font-size:clamp(16px,2.5vw,20px);color:var(--ink-2);font-weight:400;margin:0 auto;max-width:34em;letter-spacing:-.01em;}

  .picker{padding:18px 0 0;}
  .group{margin:22px 0 0;}
  .group-label{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px;padding-left:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{border:1px solid var(--hairline);background:var(--surface);color:var(--ink);font:inherit;font-size:15px;font-weight:500;padding:9px 16px;border-radius:980px;cursor:pointer;transition:background .15s,color .15s,border-color .15s,transform .05s;}
  .chip:hover{border-color:var(--ink-3);}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .chip:active{transform:scale(.97);}

  #results{padding:34px 0 0;}
  .cat-title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px;}
  .cat-note{font-size:15px;color:var(--ink-3);margin:0 0 20px;}
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .mcard{background:var(--surface);border:1px solid var(--hairline);border-radius:16px;padding:18px 18px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;opacity:0;transform:translateY(10px);animation:rise .45s cubic-bezier(.16,1,.3,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .mname{font-weight:700;font-size:17px;letter-spacing:-.01em;}
  .maltname{font-size:13px;color:var(--ink-3);margin-top:1px;}
  .mdesc{font-size:14px;color:var(--ink-2);margin:9px 0 14px;flex:1;line-height:1.45;}
  .mactions{display:flex;align-items:center;gap:14px;}
  .mgo{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:9px 16px;border-radius:980px;transition:background .15s;}
  .mgo:hover{background:var(--accent-press);}
  .mdetail{color:var(--ink-3);text-decoration:none;font-size:13px;font-weight:600;}
  .mdetail:hover{color:var(--ink);text-decoration:underline;}

  .divider{display:flex;align-items:center;gap:14px;margin:54px 0 0;color:var(--ink-3);font-size:14px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--hairline);}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--hairline);border-radius:980px;padding:6px 8px 6px 18px;box-shadow:var(--shadow);margin:18px 0 0;transition:border-color .2s,box-shadow .2s;}
  .search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,113,227,.12),var(--shadow);}
  .search-box svg{flex:0 0 auto;color:var(--ink-3);}
  #q{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:17px;color:var(--ink);padding:13px 0;min-width:0;}
  #q::placeholder{color:var(--ink-3);}
  .go{flex:0 0 auto;border:none;cursor:pointer;background:var(--accent);color:#fff;font:inherit;font-weight:600;font-size:15px;padding:11px 20px;border-radius:980px;transition:background .15s;}
  .go:hover{background:var(--accent-press);}

  .empty{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);margin-top:18px;}
  .empty p{color:var(--ink-2);font-size:15px;margin:0 0 16px;}
  .empty .mgo{display:inline-flex;}

  footer{margin-top:70px;padding:30px 0 56px;border-top:1px solid var(--hairline);text-align:center;color:var(--ink-3);font-size:13px;line-height:1.7;}
  footer a{color:var(--ink-2);text-decoration:none;}
  footer a:hover{text-decoration:underline;}
  #footExplore{margin-bottom:10px;}
  #footExplore a{font-weight:600;color:var(--accent);}
  .note{margin-top:8px;}
  .count{margin-top:8px;color:var(--ink-3);}

  @media (prefers-reduced-motion:reduce){.mcard{animation:none;opacity:1;transform:none;}.chip:active{transform:none;}}
  @media (max-width:560px){.cat-grid{grid-template-columns:1fr;}header{padding:24px 0 16px;}}
</style>

<div class="wrap">
  <div class="topbar">
    <a class="onlyone" href="https://main.onlyonecorpceo.workers.dev/" target="_blank" rel="noopener" onclick="track('onlyone_click')" aria-label="OnlyOne">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="10" cy="6.4" r="4.1" stroke="currentColor" stroke-width="2.6"/><rect x="8.7" y="10.3" width="2.6" height="7.3" rx="1.3" fill="currentColor"/></svg>
      <span>OnlyOne</span>

  <header>
    <p class="eyebrow" id="eyebrow"></p>

  <section class="picker">

      <p class="group-label" id="moodLabel"></p>
      <div class="chips" id="moodChips"></div>
    </div>
    <div class="group">

  <div class="divider" id="divider"></div>
  <section class="search-zone">

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      <input id="q" type="text" autocomplete="off" />

    <section id="searchResults" aria-live="polite"></section>

  <!-- ▼ 광고 위치 / Ad slot — 애드센스 승인 후 아래 주석을 해제하고 코드 삽입 ▼ -->
  <!-- <div class="ad-slot"></div> -->

  <footer>
    <div id="footExplore"></div>
    <div id="footContact"></div>
    <div class="note" id="footNote"></div>
    <div class="note" id="footPrivacy"></div>
    <div class="count" id="footCount"></div>
  </footer>
</div>

<script src="memes.js"></script>
<script src="categories.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script>
/* ---------- i18n ---------- */
const I18N = {
  en:{
    eyebrow:"the meme for the moment \uD83E\uDEE0",
    sub:"Pick a mood or a moment \u2014 we\u2019ll hand you the perfect memes to search on Google Images.",
    moodLabel:"By mood",
    useLabel:"By moment",
    divider:"or describe a meme yourself",
    placeholder:"e.g. a dog in a burning room saying it\u2019s fine",
    go:"Search",
    catNote:n=>`${n} memes \u00B7 tap any to open Google Images`,
    cta:"Google Images",
    detail:"details",
    emptyP:"Couldn\u2019t pin that one down. Try more detail, or search Google with exactly what you typed.",
    emptyCta:t=>`Search \u201C${t}\u201D`,
    surprise:"\uD83C\uDFB2 Surprise me",
    footExplore:n=>`Browse all ${n} memes`,
    footContact:"Contact \u00B7 partnerships",
    footNote:"No meme images are stored here \u2014 we link out to Google Image results.",
    footPrivacy:`This site uses cookies for analytics and may show ads. <a href="https://main.onlyonecorpceo.workers.dev/" target="_blank" rel="noopener">Privacy &amp; ads</a>`,
    footCount:n=>`${n} memes and counting`,
    langBtn:"\uD55C\uAD6D\uC5B4"
  },
  ko:{
    eyebrow:"\uC9C0\uAE08 \uC774 \uC21C\uAC04\uC5D0 \uB531 \uADF8 \uBC08 \uD83E\uDEE0",
    sub:"\uAE30\uBD84\uC774\uB098 \uC0C1\uD669\uB9CC \uACE0\uB974\uC138\uC694. \uB531 \uB9DE\uB294 \uBC08\uC744 \uACE8\uB77C \uAD6C\uAE00 \uC774\uBBF8\uC9C0\uAC80\uC0C9\uC73C\uB85C \uBC14\uB85C \uC5F0\uACB0\uD574\uB4DC\uB824\uC694.",
    moodLabel:"\uAE30\uBD84\uBCC4",
    useLabel:"\uC6A9\uB3C4\uBCC4",
    divider:"\uB610\uB294 \uC9C1\uC811 \uC124\uBA85\uC73C\uB85C \uCC3E\uAE30",
    placeholder:"\uC608: \uBD88\uD0C0\uB294 \uBC29\uC5D0\uC11C \uAC15\uC544\uC9C0\uAC00 \uAD1C\uCC2E\uB2E4\uACE0 \uD558\uB294 \uAC70",
    go:"\uCC3E\uAE30",
    catNote:n=>`\uBC08 ${n}\uAC1C \u00B7 \uD0ED\uD558\uBA74 \uAD6C\uAE00 \uC774\uBBF8\uC9C0\uB85C \uC5F0\uACB0`,
    cta:"\uAD6C\uAE00 \uC774\uBBF8\uC9C0",
    detail:"\uC790\uC138\uD788",
    emptyP:"\uB531 \uB9DE\uB294 \uBC08\uC744 \uBABB \uCC3E\uC558\uC5B4\uC694. \uC870\uAE08 \uB354 \uAD6C\uCCB4\uC801\uC73C\uB85C \uC801\uAC70\uB098, \uC785\uB825\uD55C \uADF8\uB300\uB85C \uAD6C\uAE00\uC5D0\uC11C \uCC3E\uC544\uBCFC \uC218 \uC788\uC5B4\uC694.",
    emptyCta:t=>`\u2018${t}\u2019 \uAD6C\uAE00 \uAC80\uC0C9`,
    surprise:"\uD83C\uDFB2 \uC544\uBB34\uAC70\uB098",
    footExplore:n=>`\uBC08 \uC0AC\uC804 \u00B7 \uC804\uCCB4 ${n}\uAC1C \uBCF4\uAE30`,
    footContact:"\uBB38\uC758 \u00B7 \uC81C\uD734",
    footNote:"\uBC08 \uC774\uBBF8\uC9C0\uB294 \uC800\uC7A5\uD558\uC9C0 \uC54A\uC73C\uBA70, \uAD6C\uAE00 \uC774\uBBF8\uC9C0\uAC80\uC0C9 \uACB0\uACFC\uB85C \uC5F0\uACB0\uB429\uB2C8\uB2E4.",
    footPrivacy:`\uC774 \uC0AC\uC774\uD2B8\uB294 \uBC29\uBB38 \uBD84\uC11D\uC744 \uC704\uD574 \uCFE0\uD0A4\uB97C \uC0AC\uC6A9\uD558\uBA70 \uAD11\uACE0\uAC00 \uD45C\uC2DC\uB420 \uC218 \uC788\uC2B5\uB2C8\uB2E4. <a href="https://main.onlyonecorpceo.workers.dev/" target="_blank" rel="noopener">\uAC1C\uC778\uC815\uBCF4\u00B7\uAD11\uACE0 \uC548\uB0B4</a>`,
    footCount:n=>`\uBC08 ${n}\uAC1C \uC218\uB85D \uC911`,
    langBtn:"EN"
  }
};

/* ---------- state ---------- */
let lang="en";
try{ const s=localStorage.getItem("tm_lang"); if(s==="ko"||s==="en") lang=s; }catch(e){}

const MEMES=window.MEMES||[];
const CATS=window.CATEGORIES||{moods:[],uses:[]};
const ALLCATS=[...CATS.moods,...CATS.uses];

// slugs (must match build.js)
const slugify=s=>s.toLowerCase().normalize("NFKD").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,60);
const SLUG=new Map();
(function(){const seen={};MEMES.forEach(m=>{let b=slugify(m.name_en)||"meme",x=b,n=2;while(seen[x])x=b+"-"+(n++);seen[x]=true;SLUG.set(m,x);});})();
const pageOf=m=>`m/${SLUG.get(m)}/`;

const byName=new Map(MEMES.map(m=>[m.name_en,m]));
const HAY=MEMES.map(m=>(m.name_en+" "+m.name_ko+" "+m.tags.join(" ")+" "+m.desc_en+" "+m.desc_ko).toLowerCase());

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const imgUrl=q=>"https://www.google.com/search?tbm=isch&q="+encodeURIComponent(q);
function track(n,p){ if(typeof gtag==="function") gtag("event",n,p); }
const nameOf=m=>lang==="en"?m.name_en:m.name_ko;
const altNameOf=m=>lang==="en"?m.name_ko:m.name_en;
const descOf=m=>lang==="en"?m.desc_en:m.desc_ko;
const arrow=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>`;

/* ---------- category → meme list (seed first, then keyword auto-match) ---------- */
function listFor(cat){
  const out=[], seen=new Set();
  (cat.seed||[]).forEach(nm=>{ const m=byName.get(nm); if(m&&!seen.has(m)){seen.add(m);out.push(m);} });
  MEMES.map((m,i)=>({m,s:(cat.kw||[]).reduce((a,k)=>a+(HAY[i].includes(k.toLowerCase())?1:0),0)}))
    .filter(x=>x.s>0).sort((a,b)=>b.s-a.s)
    .forEach(x=>{ if(!seen.has(x.m)){seen.add(x.m);out.push(x.m);} });
  return out.slice(0,24);
}
function randomList(){ return [...MEMES].sort(()=>Math.random()-0.5).slice(0,8); }

/* ---------- render ---------- */
function memeCard(m,ctx){
  return `<div class="mcard">
    <span class="mname">${esc(nameOf(m))}</span>
    <span class="maltname">${esc(altNameOf(m))}</span>
    <p class="mdesc">${esc(descOf(m))}</p>
    <div class="mactions">
      <a class="mgo" target="_blank" rel="noopener" href="${imgUrl(m.query)}"
         onclick="track('google_redirect',{source:'${ctx}',meme:'${esc(m.name_en).replace(/'/g,"")}'})">${esc(I18N[lang].cta)} ${arrow}</a>
      <a class="mdetail" href="${pageOf(m)}">${esc(I18N[lang].detail)}</a>
    </div>
  </div>`;
}
function renderCategory(cat){
  const t=I18N[lang];
  const list = cat.id==="__random" ? randomList() : listFor(cat);
  const label = cat.id==="__random" ? t.surprise : `${cat.emoji} ${lang==="en"?cat.en:cat.ko}`;
  $("results").innerHTML = `
    <h2 class="cat-title">${esc(label)}</h2>
    <p class="cat-note">${esc(t.catNote(list.length))}</p>
    <div class="cat-grid">${list.map(m=>memeCard(m,"category")).join("")}</div>`;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("active", c.dataset.cat===cat.id));
}

/* ---------- chips ---------- */
function renderChips(){
  const t=I18N[lang];
  const chip=c=>`<button class="chip" data-cat="${c.id}">${c.emoji} ${esc(lang==="en"?c.en:c.ko)}</button>`;
  $("moodChips").innerHTML = CATS.moods.map(chip).join("");
  $("useChips").innerHTML  = CATS.uses.map(chip).join("")
    + `<button class="chip" data-cat="__random">${esc(t.surprise)}</button>`;
  document.querySelectorAll(".chip").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.cat;
      const cat = id==="__random" ? {id:"__random"} : ALLCATS.find(c=>c.id===id);
      currentCat=cat; currentView="category";
      track("pick_category",{category:id});
      renderCategory(cat);
      $("results").scrollIntoView({behavior:"smooth",block:"nearest"});
    });
  });
}

/* ---------- secondary describe-search ---------- */
function smartSearch(term){
  const q=term.toLowerCase().trim();
  const toks=q.split(/\s+/).filter(w=>w.length>=2);
  const scored=MEMES.map((m,i)=>{ const h=HAY[i]; let s=0;
    if(q.length>=2&&h.includes(q)) s+=50;
    toks.forEach(tk=>{ if(h.includes(tk)) s+=10; }); return {item:m,s}; });
  fuse.search(term).forEach(r=>{ const i=MEMES.indexOf(r.item); if(i>=0) scored[i].s+=(1-r.score)*8; });
  return scored.filter(x=>x.s>=6).sort((a,b)=>b.s-a.s).slice(0,6);
}
const fuse=new Fuse(MEMES,{keys:["name_en","name_ko","tags","desc_en","desc_ko"],threshold:0.4,ignoreLocation:true,minMatchCharLength:3,includeScore:true});
let lastTerm="";
function renderSearch(){
  const t=I18N[lang];
  if(!lastTerm){ $("searchResults").innerHTML=""; return; }
  const hits=smartSearch(lastTerm);
  if(!hits.length){
    $("searchResults").innerHTML=`<div class="empty"><p>${esc(t.emptyP)}</p>
      <a class="mgo" target="_blank" rel="noopener" href="${imgUrl(lastTerm)}"
         onclick="track('google_redirect',{source:'search_empty'})">${esc(t.emptyCta(lastTerm))} ${arrow}</a></div>`;
    return;
  }
  $("searchResults").innerHTML=`<div class="cat-grid" style="margin-top:18px">${hits.map(h=>memeCard(h.item,"search")).join("")}</div>`;
}
function doSearch(){
  const term=$("q").value.trim(); if(!term){ $("q").focus(); return; }
  lastTerm=term;
  track("meme_search",{search_term:term});
  renderSearch();
  $("searchResults").scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ---------- static text ---------- */
function paintStatic(){
  const t=I18N[lang];
  document.documentElement.lang=lang;
  $("eyebrow").textContent=t.eyebrow;
  $("sub").textContent=t.sub;
  $("moodLabel").textContent=t.moodLabel;
  $("useLabel").textContent=t.useLabel;
  $("divider").textContent=t.divider;
  $("q").placeholder=t.placeholder;
  $("go").textContent=t.go;
  $("langBtn").textContent=t.langBtn;
  $("footExplore").innerHTML=`<a href="explore/">${esc(t.footExplore(MEMES.length))}</a>`;
  $("footContact").innerHTML=`${esc(t.footContact)} \u2014 <a href="mailto:onlyonecorpceo@gmail.com">onlyonecorpceo@gmail.com</a>`;
  $("footNote").textContent=t.footNote;
  $("footPrivacy").innerHTML=t.footPrivacy;
  $("footCount").textContent=t.footCount(MEMES.length);
}

/* ---------- state holders + lang toggle ---------- */
let currentView="category", currentCat=CATS.moods[0];
function setLang(next){
  lang=next; try{ localStorage.setItem("tm_lang",lang); }catch(e){}
  paintStatic(); renderChips();
  if(currentView==="category" && currentCat) renderCategory(currentCat);
  renderSearch();
}

/* ---------- init ---------- */
